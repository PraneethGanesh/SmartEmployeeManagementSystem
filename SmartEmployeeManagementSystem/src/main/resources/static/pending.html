<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Account Pending</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Outfit', sans-serif;
            background: #070910;
            color: #dde4f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: #0e1118;
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 16px;
            padding: 48px;
            max-width: 420px;
            text-align: center;
        }
        .icon { font-size: 48px; margin-bottom: 20px; }
        h1 { font-size: 22px; font-weight: 700; margin-bottom: 12px; }
        p  { font-size: 14px; color: #6b7591; line-height: 1.6; margin-bottom: 24px; }
        .email {
            background: #131821;
            border: 1px solid rgba(79,140,255,0.2);
            border-radius: 8px;
            padding: 10px 16px;
            font-size: 13px;
            color: #4f8cff;
            margin-bottom: 28px;
            font-family: monospace;
        }
        .btn {
            padding: 10px 24px;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: #6b7591;
            font-size: 13px;
            cursor: pointer;
        }
        .btn:hover { border-color: rgba(255,255,255,0.2); color: #dde4f0; }
    </style>
</head>
<body>
<div class="card">
    <div class="icon">⏳</div>
    <h1>Account Pending Approval</h1>
    <p>You've successfully signed in with Google. Your account is currently awaiting approval from an admin or manager.</p>
    <div class="email" id="user-email">Loading...</div>
    <p>Once approved, you'll have full access to the portal. Please contact your manager or admin.</p>
    <button class="btn" onclick="logout()">Sign out</button>
</div>

<script>
    // Show the user their email from JWT
    const token = localStorage.getItem('jwt_token');
    if (token) {
        try {
            const payload = JSON.parse(atob(token.split('.')[1]));
            document.getElementById('user-email').textContent = payload.sub || 'Unknown';
        } catch(e) {}
    }

    function logout() {
        localStorage.clear();
        window.location.href = '/google.html';
    }
</script>
</body>
</html>
